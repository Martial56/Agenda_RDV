{% extends 'base.html' %}
{% block auth_content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">💊</div>
    <div class="login-title">ARV Agenda</div>
    <div class="login-sub">Système de Suivi des Rendez-Vous ARV<br>Connectez-vous pour accéder</div>
    {% if form.errors %}
    <div class="alert alert-danger">❌ Identifiants incorrects. Veuillez réessayer.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Nom d'utilisateur</label>
        <input type="text" name="username" class="form-control" placeholder="Votre identifiant" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="justify-content:center; padding:12px;">
        🔐 Se connecter
      </button>
    </form>
  </div>
</div>
{% endblock %}
